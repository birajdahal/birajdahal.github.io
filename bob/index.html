<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geometric Series Explorer</title>
<link rel="icon" type="image/x-icon" href="bob.ico">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="geometric-series.css">
</head>
<body>

<div class="container">
  <header>
    <h1><span>Bob's</span> Geometric Series <span>Explorer</span></h1>
    <div class="header-params">
      <div class="header-param">
        <span class="label">r =</span>
        <span class="val" id="headerR">0.50</span>
        <button id="negToggle" class="neg-toggle" title="Toggle negative r">negative</button>
      </div>
    </div>
  </header>

  <div class="layout">
    <div class="left-panel">

      <div class="card">
        <div class="card-title">Parameters</div>
        <div class="control-group">
          <label>Common ratio (r)</label>
          <div class="slider-row">
            <input type="range" id="rSlider" min="0" max="1.5" step="0.01" value="0.5">
            <span class="value-display" id="rValue">0.50</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Playback</div>
        <div class="playback">
          <button id="playBtn" title="Play" aria-label="Play">▶</button>
          <button id="stepBtn" title="Step +1" aria-label="Step forward one term">⏭</button>
          <button id="resetBtn" title="Reset" aria-label="Reset">↺</button>
          <button class="speed-btn active" data-speed="550">1×</button>
          <button class="speed-btn" data-speed="238">2×</button>
          <button class="speed-btn" data-speed="119">4×</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Partial Sums</div>
        <div class="sequence" id="sequence">—</div>
      </div>

    </div>

    <div class="right-panel">
      <div class="stats-strip">
        <div class="stat-item">
          <span class="stat-label">Term</span>
          <span class="stat-value" id="termNum">—</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Sₙ</span>
          <span class="stat-value gold" id="partialSum">—</span>
        </div>
      </div>
      <div class="bob-track-card">
        <div class="bob-track-header">
          <span class="card-title card-title--inline">Bob the Grasshopper</span>
          <span class="bob-distance" id="bobDistance">Distance: 0</span>
        </div>
        <canvas id="bobCanvas"></canvas>
      </div>
      <div class="chart-card">
        <canvas id="chart"></canvas>
      </div>
    </div>
  </div>
</div>

<script src="geometric-series.js"></script>

</body>
</html>
